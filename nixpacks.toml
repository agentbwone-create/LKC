[phases.setup]
nixPkgs = ['python311', 'gcc']

[phases.install]
cmds = ['pip install -r requirements.txt']

[phases.build]
cmds = [
  'python manage.py collectstatic --noinput',
  'python manage.py migrate --noinput'
]

[start]
cmd = 'python manage.py createsuperuser --noinput --username admin --email admin@gmail.com; gunicorn lkc_school.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120'
